<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Configuration Terminal</title>
</head>
<body>
    <div class="card">
        <h2>Grid Configuration</h2>
        <p class="subtitle" style="font-weight:bold; font-style:italic; font-size: 14px" >Tic-Tac-Toe is a zero-sum combinatorial game resolved completely via minimax mathematical search pathways<br> Select the appropriate combinations to start the game.</p>
 
        <form method="POST" id="setupForm">
            <div class="input-group">
                <label style="font-weight:bold; text-decoration: underline;">Opponent Type Vector</label>
                <select name="player_type" id="player_type" onchange="validateSetup()">
                    <option value="" disabled selected>-- Select Strategy Target --</option>
                    <option value="local">Human vs Human (Local Terminal)</option>
                    <option value="ai">Human vs Computer (AI Architecture)</option>
                </select>
            </div>

            <div class="input-group" id="turn_group" style="display: none;">
                <label>First Turn Initiative</label>
                <select name="first_turn" id="first_turn">
                    <option value="human" selected>Player Starts First (X)</option>
                    <option value="human" selected>Player Starts First (O)</option>
                    <option value="computer">Computer Starts First (X)</option>
                    <option value="computer">Computer Starts First (O)</option>
                </select>
            </div>

            <div class="input-group">
                <label style="font-weight:bold; text-decoration: underline;">Processing Scale (Difficulty Level)</label>
                <select name="level" id="level" onchange="validateSetup()">
                    <option value="" disabled selected>-- Select Search Matrix Depth --</option>
                    <option value="easy">Easy (Permissive Errors Allowed)</option>
                    <option value="medium">Medium (Moderate Deep Search)</option>
                    <option value="hard">Hard (Unbeatable Optimal Trees)</option>
                </select>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 30px;">
                <button type="submit" id="startBtn" class="btn" disabled style="opacity: 0.4; cursor: not-allowed;">Start Match</button>
                <a href="/" class="btn btn-secondary">Exit Panel</a>
            </div>
        </form>
    </div>

    <script>
        function validateSetup() {
            const pType = document.getElementById("player_type").value;
            const lvl = document.getElementById("level").value;
            const startBtn = document.getElementById("startBtn");

            if (pType && lvl) {
                startBtn.disabled = false;
                startBtn.style.opacity = "1";
                startBtn.style.cursor = "pointer";
            }
        }
    </script>
</body>
</html>
